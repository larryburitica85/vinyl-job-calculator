<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vinyl Job Quote Calculator</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container {
    background: #1e293b;
    padding: 30px;
    border-radius: 12px;
    width: 320px;
    box-shadow: 0 10px 30px rgba(0,0,0,.4);
}
h2 {
    text-align: center;
}
input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 6px;
    border: none;
}
button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    background: #22c55e;
    border: none;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
}
.result {
    margin-top: 20px;
    font-size: 20px;
    text-align: center;
}
</style>

</head>

<body>

<div class="container">
<h2>Vinyl Quote Calculator</h2>

<label>Width (feet)</label>
<input type="number" id="width" placeholder="Enter width">

<label>Height (feet)</label>
<input type="number" id="height" placeholder="Enter height">

<label>Price per sq ft ($)</label>
<input type="number" id="price" value="6">

<label>Minimum job price ($)</label>
<input type="number" id="minimum" value="80">

<button onclick="calculateQuote()">Calculate</button>

<div class="result" id="result">$0</div>
</div>

<script>
function calculateQuote() {

let width = parseFloat(document.getElementById("width").value) || 0;
let height = parseFloat(document.getElementById("height").value) || 0;
let price = parseFloat(document.getElementById("price").value) || 0;
let minimum = parseFloat(document.getElementById("minimum").value) || 0;

let sqft = width * height;
let total = sqft * price;

if (total < minimum) {
    total = minimum;
}

document.getElementById("result").innerHTML =
"$" + total.toFixed(2) + "<br><small>" +
sqft.toFixed(2) + " sq ft</small>";
}
</script>

</body>
</html>
